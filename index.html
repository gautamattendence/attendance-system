<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Elevator India - Attendance</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        
        /* LOGO STYLING */
        .logo-container { margin-bottom: 20px; }
        .logo-img { width: 150px; height: auto; border-radius: 8px; margin-bottom: 10px; }
        .company-name { font-weight: bold; font-size: 1.4rem; color: #002e5d; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; background-color: #002e5d; color: white; border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #cccccc; }
        
        #status { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.jpg" alt="BS Elevator Logo" class="logo-img">
        <div class="company-name">BS ELEVATOR INDIA</div>
    </div>

    <form id="attendanceForm">
        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" required>
        </div>
        <div class="form-group">
            <label>Blood Group</label>
            <select name="blood">
                <option>A+</option><option>B+</option><option>O+</option><option>AB+</option>
                <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
            </select>
        </div>
        <button type="submit" id="submitBtn">Submit Attendance</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // Replace this with your Google App Script URL
    const form = document.getElementById('attendanceForm');
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Processing...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                statusDiv.innerText = "Attendance Submitted Successfully! ✔️";
                statusDiv.className = "success";
                statusDiv.style.display = "block";
                form.reset();
            })
            .catch(error => {
                alert("Error! Check your Script URL.");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "Submit Attendance";
            });
    });
</script>

</body>
</html>
