<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Elevator India - Attendance</title>
    <style>
        /* Modern, Mobile-First Design */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { background-color: #ffffff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        
        /* Centered Logo Styling */
        .logo-container { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-img { width: 160px; height: auto; border-radius: 10px; margin-bottom: 5px; }
        
        .notice { background-color: #fff5f5; border-left: 4px solid #e53e3e; color: #c53030; padding: 12px; font-size: 0.85rem; text-align: left; margin-bottom: 20px; border-radius: 4px; line-height: 1.4; }
        h2 { color: #002e5d; margin: 0 0 20px 0; font-size: 1.5rem; }

        /* Form Layout */
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #4a5568; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #002e5d; box-shadow: 0 0 0 3px rgba(0,46,93,0.1); }
        
        /* Button States */
        button { width: 100%; padding: 14px; background-color: #002e5d; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }
        
        /* Status Feedback */
        #status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; font-weight: bold; font-size: 0.9rem; }
        .success { background-color: #f0fff4; color: #2f855a; border: 1px solid #c6f6d5; }
        .error { background-color: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.jpg" alt="BS Elevator Logo" class="logo-img">
    </div>

    <div class="notice">

    </div>

            <input type="text" name="name" required placeholder="Enter your name">
        </div>
        <div class="form-group">

            <input type="tel" name="mobile" required placeholder="Enter mobile number">
        </div>
        <div class="form-group">

            <select name="blood" required>
                <option value="">-- Select --</option>

                <option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
            </select>
        </div>

        <button type="submit" id="submitBtn" disabled>Checking Location...</button>
        <div id="status"></div>
    </form>
</div>
